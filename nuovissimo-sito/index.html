    <body class="is-preload">

        <header id="header">
            <h1>Matteo Sanna</h1>
            <p>Engineering cloud solutions with automation in mind<br />
            your next big thing. Brought to you by <a href="http://html5up.net">HTML5 UP</a>.</p>
            
            <p>Visite: <span id="counter-number">Caricamento...</span></p>
        </header>git add .

        <form id="signup-form" method="post" action="#">
            <input type="email" name="email" id="email" placeholder="Email Address" />
            <input type="submit" value="Sign Up" />
        </form>

        <footer id="footer">
            <ul class="icons">
                <li><a href="#" class="icon brands fa-twitter"><span class="label">Twitter</span></a></li>
                <li><a href="#" class="icon brands fa-instagram"><span class="label">Instagram</span></a></li>

            </ul>
        </footer>

        <script>
            const counterElement = document.getElementById("counter-number");

            async function updateCounter() {
                try {
                    // Chiamata alla Lambda
                    const response = await fetch("https://tw7puq4kvbwnbngog4wskwqozm0hrpuu.lambda-url.ap-southeast-1.on.aws/");
                    
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }

                    const data = await response.json();
                    
                    // CORREZIONE: Estraiamo la proprietà 'views' dall'oggetto JSON ricevuto
                    counterElement.innerHTML = data.views;
                    
                } catch (error) {
                    console.error("Errore nel recupero delle visite:", error);
                    counterElement.innerHTML = "N/A";
                }
            }

            // Avvia la funzione al caricamento della pagina
            updateCounter();
        </script>

    </body>
</html>
